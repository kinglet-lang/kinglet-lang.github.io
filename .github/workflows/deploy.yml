name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync install scripts from bootstrap
        run: |
          curl -fsSL https://raw.githubusercontent.com/kinglet-lang/bootstrap/canon/scripts/install.sh -o install.sh
          chmod +x install.sh
          curl -fsSL https://raw.githubusercontent.com/kinglet-lang/bootstrap/canon/scripts/install.ps1 -o install.ps1
          # Keep one-liner URLs in script headers aligned with this site.
          sed -i 's|raw.githubusercontent.com/kinglet-lang/bootstrap/canon/scripts/install.sh|kinglet-lang.org/install.sh|' install.sh
          sed -i 's|raw.githubusercontent.com/kinglet-lang/bootstrap/canon/scripts/install.ps1|kinglet-lang.org/install.ps1|' install.ps1
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
